name: Seat Alerts Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  ping-alerts-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Seat Alerts Endpoint
        run: |
          echo "Hitting the Seat Alerts Vercel API..."
          curl -H "Content-Type: application/json" -X GET https://www.conuplanner.com/api/alerts/cron
          echo "Done."
